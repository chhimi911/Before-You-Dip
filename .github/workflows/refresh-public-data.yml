name: Refresh California water data

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-california-water-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Download and package current public data
        run: npm run fetch:data

      - name: Validate the generated snapshot
        run: npm run verify:data

      - name: Test and build with the new data
        run: npm test && npm run lint && npm run typecheck && npm run build

      - name: Publish changed snapshots
        shell: bash
        run: |
          if git diff --quiet -- src/data; then
            echo "The source snapshots have not changed."
            exit 0
          fi
          git config user.name "before-you-dip-data-bot"
          git config user.email "before-you-dip-data-bot@users.noreply.github.com"
          git add src/data
          git commit -m "data: refresh California water snapshots"
          git push

